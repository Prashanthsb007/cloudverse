apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: cloudverse-ebs
provisioner: ebs.csi.aws.com
volumeBindingMode: WaitForFirstConsumer
parameters:
  type: gp3
  encrypted: "true"
reclaimPolicy: Retain
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: cloudverse
  labels:
    app: postgres
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: cloudverse-ebs
  resources:
    requests:
      storage: 20Gi
